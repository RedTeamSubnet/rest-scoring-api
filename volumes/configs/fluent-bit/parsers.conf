[PARSER]
    Name        scoring_json
    Format      json
    Time_Key    timestamp
    Time_Format %Y-%m-%dT%H:%M:%S%z
    Decode_Field_As escaped_utf8 message

[PARSER]
    Name        challenge_from_filepath
    Format      regex
    Regex       ^/var/log/rest-scoring-api/json/(?<challenge>[^/]+)\.all\.json\.log$
